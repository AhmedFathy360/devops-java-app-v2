name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

env:
  IMAGE_NAME: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/ci-java-app
  IMAGE_TAG: ${{ github.sha }}
  RELEASE_NAME: ci-java-app
  NAMESPACE: production
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build:
    runs-on: self-hosted

    outputs:
      image-tag: ${{ env.IMAGE_TAG }}

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn -B clean package

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG .

      - name: Push Docker image
        run: docker push $IMAGE_NAME:$IMAGE_TAG


  deploy:

  needs: build
  runs-on: self-hosted

  steps:

    - uses: actions/checkout@v4

    - name: Setup Helm
      uses: azure/setup-helm@v4
      with:
        version: v3.15.0

    - name: Configure kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
        chmod 600 ~/.kube/config

    - name: Clone Helm repo
      run: |
        git clone https://github.com/AhmedFathy360/devops-java-helm-v2..git \
          --depth 1 --branch main ./helm-repo

    - name: Deploy with Helm
      run: |
        helm upgrade --install $RELEASE_NAME ./helm-repo \
          --namespace $NAMESPACE \
          --create-namespace \
          --set image.repository=$IMAGE_NAME \
          --set image.tag=$IMAGE_TAG

    - name: Verify rollout
      run: |
        kubectl rollout status deployment/$RELEASE_NAME -n $NAMESPACE