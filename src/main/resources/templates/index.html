<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DevOps Demo</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f0f8ff; }
        h1 { color: #2c3e50; }
        .message-box { border: 2px solid #3498db; border-radius: 8px; padding: 20px; display: inline-block; background-color: white; box-shadow: 2px 2px 10px rgba(0,0,0,0.1); }
        button { background-color: #3498db; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; margin-top: 20px; }
        button:hover { background-color: #2980b9; }
    </style>
</head>
<body>
    <h1>🚀 Kubernetes CI/CD Pipeline Demo</h1>
    <div class="message-box">
        <p th:text="${message}">Default message</p>
        <p><small>Fetched from the backend at: <span th:text="${#dates.format(#dates.createNow(), 'yyyy-MM-dd HH:mm:ss')}"></span></small></p>
    </div>

    <button onclick="fetchMessage()">Refresh Message via REST</button>
    <div id="restMessage" style="margin-top: 20px;"></div>

    <script>
        function fetchMessage() {
            fetch('/')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('restMessage').innerHTML =
                        '<div class="message-box" style="border-color: #e74c3c;">' +
                        '<p>' + data + '</p>' +
                        '<p><small>Fetched from REST endpoint</small></p>' +
                        '</div>';
                })
                .catch(err => {
                    document.getElementById('restMessage').innerText = 'Error: ' + err;
                });
        }
    </script>
</body>
</html>
